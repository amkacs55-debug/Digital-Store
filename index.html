<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store - SMM Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0b0f11;
            --card-bg: #11181b;
            --accent: #00e5ff;
            --secondary: #ff00ff;
            --success: #2ecc71;
            --input-bg: #1a2428;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--accent); letter-spacing: 2px; margin: 0; font-size: 28px; text-shadow: 0 0 10px var(--accent); }
        header p { color: var(--secondary); font-size: 10px; margin: 5px 0; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #888; }
        input, select, textarea {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box;
            font-family: inherit; font-size: 14px;
        }
        /* Сэтгэгдэл бичих хэсэг */
        textarea { 
            height: 90px; 
            resize: none; 
            border: 1px solid #444;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--secondary); outline: none; }

        .payment-section {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            border: 1px solid #222; margin-top: 20px;
        }
        .qr-box { text-align: center; margin-bottom: 20px; }
        .qr-box img { width: 140px; border: 4px solid white; border-radius: 10px; }

        .info-card {
            background: var(--input-bg); padding: 12px; border-radius: 12px;
            margin-bottom: 10px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .info-card:active { background: var(--success); transform: scale(0.97); }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center;
        }
        .btn-khan { background: #1c3d33; color: white; }
        .btn-receipt { background: #222; color: white; border: 1px dashed #555; }
        .btn-order { background: var(--success); color: white; font-size: 16px; margin-top: 20px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        
        .contact-us { margin-top: 30px; text-align: center; padding: 20px; border-top: 1px solid #222; }
        .contact-us a { text-decoration: none; color: var(--accent); font-weight: bold; margin: 0 10px; font-size: 14px; }

        .spinner {
            display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DIGITAL STORE</h1>
        <p>PREMIUM SMM SOLUTIONS</p>
    </header>

    <div class="input-group">
        <label>ХҮЛЭЭН АВАХ ЛИНК (URL)</label>
        <input type="text" id="url_input" placeholder="https://instagram.com/user...">
    </div>

    <div class="input-group">
        <label>ХОЛБОГДОХ УТАС</label>
        <input type="number" id="phone_input" placeholder="88******" oninput="updateTransferDesc()">
    </div>

    <div class="input-group">
        <label>ҮЙЛЧИЛГЭЭ СОНГОХ</label>
        <select id="service_select" onchange="updatePrice()">
            <option value="Instagram Followers" data-price="7000">Instagram Followers (1k = 7,000₮)</option>
            <option value="Instagram Reel Like" data-price="5000">Instagram Reel Like (1k = 5,000₮)</option>
            <option value="FB Page Followers" data-price="7000">FB Page Followers (1k = 7,000₮)</option>
            <option value="TikTok Followers" data-price="8000">TikTok Followers (1k = 8,000₮)</option>
        </select>
    </div>

    <div class="input-group">
        <label>СЭТГЭГДЭЛ ҮЛДЭЭХ ✨</label>
        <textarea id="comment_input" placeholder="Сэтгэгдэл эсвэл захиалгын талаар нэмэлт мэдээлэл үлдээх..."></textarea>
    </div>

    <div class="payment-section">
        <div class="qr-box">
            <p style="font-size: 12px; color: #888;">PAYMENT QR</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=99106925689" alt="QR">
        </div>

        <div class="info-card" onclick="copyValue('99106925689', 'Дансны дугаар амжилттай хуулагдлаа')">
            <div>
                <span style="font-size: 10px; color: #888; display: block;">ХААН БАНК | Б. ХОС-ЭРДЭНЭ</span>
                <span style="font-weight: bold;">99106925689</span>
            </div>
            <span>📋 Хуулах</span>
        </div>

        <div class="info-card" onclick="copyTransferDesc()">
            <div>
                <span style="font-size: 10px; color: #888; display: block;">ГҮЙЛГЭЭНИЙ УТГА</span>
                <span id="desc_display" style="font-weight: bold;">Дугаараа бичнэ үү</span>
            </div>
            <span>📋 Хуулах</span>
        </div>

        <button class="btn btn-khan" onclick="openKhan()">🏦 KHAN BANK НЭЭХ</button>
        
        <input type="file" id="receipt_file" accept="image/*" style="display: none;" onchange="fileChosen()">
        <button class="btn btn-receipt" onclick="document.getElementById('receipt_file').click()">
            📷 <span id="receipt_label">БАРИМТ ХАВСАРГАХ</span>
        </button>
    </div>

    <button class="btn btn-order" id="order_btn" onclick="submitOrder()">
        <span id="btn_text">ЗАХИАЛГА ӨГӨХ</span>
        <div class="spinner" id="loader"></div>
    </button>

    <div class="contact-us">
        <p style="font-size: 12px; color: #555;">БИДЭНТЭЙ ХОЛБОГДОХ</p>
        <a href="https://t.me/digital_fanshop">✈️ TELEGRAM</a>
        <a href="https://instagram.com/digital_fanshop">📸 INSTAGRAM</a>
    </div>
</div>

<script>
    function updatePrice() {
        const sel = document.getElementById('service_select');
        const price = sel.options[sel.selectedIndex].getAttribute('data-price');
        document.getElementById('btn_text').innerText = `ЗАХИАЛГА ӨГӨХ (${price}₮ + 10% БОНУС)`;
    }

    function updateTransferDesc() {
        const val = document.getElementById('phone_input').value;
        document.getElementById('desc_display').innerText = val ? val : "Дугаараа бичнэ үү";
    }

    function copyValue(text, msg) {
        navigator.clipboard.writeText(text);
        Swal.fire({ icon: 'success', title: msg, showConfirmButton: false, timer: 1200, background: '#11181b', color: '#fff' });
    }

    function copyTransferDesc() {
        const val = document.getElementById('phone_input').value;
        if(!val) {
            Swal.fire({ icon: 'warning', title: 'Дугаараа эхлээд бичнэ үү', background: '#11181b', color: '#fff' });
            return;
        }
        copyValue(val, 'Гүйлгээний утга амжилттай хуулагдлаа');
    }

    function openKhan() {
        window.location.href = "khanbank://";
        setTimeout(() => { window.location.href = "https://www.khanbank.com"; }, 2000);
    }

    function fileChosen() {
        if(document.getElementById('receipt_file').files[0]) {
            document.getElementById('receipt_label').innerText = "БАРИМТ ХАВСАРГАЛАА ✅";
        }
    }

    async function submitOrder() {
        const token = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ"; 
        const chat_id = "7069407872";
        
        const url = document.getElementById('url_input').value;
        const phone = document.getElementById('phone_input').value;
        const service = document.getElementById('service_select').value;
        const comment = document.getElementById('comment_input').value || "Байхгүй";
        const file = document.getElementById('receipt_file').files[0];

        if(!url || !phone || !file) {
            Swal.fire({ icon: 'error', title: 'Мэдээлэл дутуу!', background: '#11181b', color: '#fff' });
            return;
        }

        const btn = document.getElementById('order_btn');
        const loader = document.getElementById('loader');
        const txt = document.getElementById('btn_text');

        btn.disabled = true;
        loader.style.display = "inline-block";
        txt.innerText = "ИЛГЭЭЖ БАЙНА...";

        // Телеграм руу очих мэдээлэл
        const caption = `🚀 *ШИНЭ ЗАХИАЛГА*\n\n🔗 *Линк:* ${url}\n📞 *Утас:* ${phone}\n🛠 *Үйлчилгээ:* ${service}\n💬 *Сэтгэгдэл:* ${comment}\n🎁 *Бонус:* +10%`;

        const formData = new FormData();
        formData.append('chat_id', chat_id);
        formData.append('photo', file);
        formData.append('caption', caption);
        formData.append('parse_mode', 'Markdown');

        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
            if(res.ok) {
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Амжилттай!', 
                    text: 'Манайхаар үйлчлүүлсэнд баярлалаа хөөрхөнөө ✨', 
                    background: '#11181b', 
                    color: '#fff'
                });
                document.getElementById('comment_input').value = ""; // Бичсэн зүйлийг арилгах
            } else { throw new Error(); }
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Алдаа!', text: 'Илгээхэд алдаа гарлаа.', background: '#11181b', color: '#fff' });
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
            updatePrice();
        }
    }
    updatePrice();
</script>
</body>
</html>
