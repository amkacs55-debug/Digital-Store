<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --bg: #050505;
            --card-active: rgba(0, 242, 255, 0.08);
            --card-border-active: rgba(0, 242, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px 20px 140px 20px; }
        .container { width: 100%; max-width: 500px; }

        h1 { font-family: 'Orbitron'; text-align: center; font-size: 2rem; background: linear-gradient(to right, var(--neon), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin-bottom: 5px; }
        .sub-title { text-align: center; font-size: 0.7rem; opacity: 0.5; margin-bottom: 25px; letter-spacing: 1px; }

        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 25px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.65rem; margin-bottom: 7px; color: var(--neon); font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #222; background: rgba(0,0,0,0.6); color: white; outline: none; font-size: 0.9rem; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .service-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        .platform-header { font-family: 'Orbitron'; font-size: 0.85rem; color: rgba(255,255,255,0.7); margin: 15px 0 5px 5px; display: flex; align-items: center; }
        .platform-header::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--purple); border-radius: 50%; margin-right: 8px; }

        .service-option input[type="radio"] { display: none; }
        .service-card { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .service-option input[type="radio"]:checked + .service-card { background: var(--card-active); border-color: var(--card-border-active); }

        .service-title { font-size: 0.85rem; color: #ddd; }
        .service-title span { font-family: 'Orbitron'; font-weight: bold; color: white; }
        .service-price { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--neon); }

        .btn { width: 100%; padding: 16px; margin-top: 10px; border-radius: 14px; border: none; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }

        #paymentArea { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .qr-item { background: white; padding: 8px; border-radius: 12px; }
        .qr-item img { width: 100%; border-radius: 8px; display: block; }
        .bank-info { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; font-size: 0.8rem; border: 1px solid rgba(0, 242, 255, 0.1); line-height: 1.6; }

        .fixed-footer { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--purple); border-radius: 20px; padding: 15px; text-align: center; z-index: 1000; }
        .call-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(135deg, #9333ea, #4f46e5); color: white; text-decoration: none; padding: 12px; border-radius: 14px; font-weight: bold; font-family: 'Orbitron'; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>DIGITAL STORE</h1>
    <p class="sub-title">PREMIUM SMM PANEL</p>
    <div class="glass-card">
        
        <div id="formSection">
            <div class="input-group">
                <label>ХОЛБООС (LINK)</label>
                <input type="url" id="link" placeholder="Хаяг эсвэл постоо оруулна уу" required>
            </div>

            <div class="input-group">
                <label>ҮЙЛЧИЛГЭЭ СОНГОХ</label>
                <div class="service-grid">
                    
                    <div class="platform-header">Facebook</div>
                    <label class="service-option"><input type="radio" name="smm_service" value="12000" data-name="FB 1k Followers"><div class="service-card"><div class="service-title"><span>1k</span> Followers</div><div class="service-price">12,000₮</div></div></label>
                    <label class="service-option"><input type="radio" name="smm_service" value="4500" data-name="FB 1k Reactions"><div class="service-card"><div class="service-title"><span>1k</span> Reactions (Like/Love)</div><div class="service-price">4,500₮</div></div></label>
                    <label class="service-option"><input type="radio" name="smm_service" value="14000" data-name="FB 500 Shares"><div class="service-card"><div class="service-title"><span>500</span> Shares</div><div class="service-price">14,000₮</div></div></label>

                    <div class="platform-header">Instagram</div>
                    <label class="service-option"><input type="radio" name="smm_service" value="1500" data-name="IG 100 Followers"><div class="service-card"><div class="service-title"><span>100</span> Followers</div><div class="service-price">1,500₮</div></div></label>
                    <label class="service-option"><input type="radio" name="smm_service" value="10000" data-name="IG 1k Followers"><div class="service-card"><div class="service-title"><span>1k</span> Followers</div><div class="service-price">10,000₮</div></div></label>
                    <label class="service-option"><input type="radio" name="smm_service" value="5000" data-name="IG 1k Likes"><div class="service-card"><div class="service-title"><span>1k</span> Likes</div><div class="service-price">5,000₮</div></div></label>

                    <div class="platform-header">TikTok</div>
                    <label class="service-option"><input type="radio" name="smm_service" value="15000" data-name="TikTok 1k Followers"><div class="service-card"><div class="service-title"><span>1k</span> Followers</div><div class="service-price">15,000₮</div></div></label>
                    <label class="service-option"><input type="radio" name="smm_service" value="2000" data-name="TikTok 5k Views"><div class="service-card"><div class="service-title"><span>5k</span> Views</div><div class="service-price">2,000₮</div></div></label>
                </div>
            </div>

            <div class="input-group">
                <label>ХОЛБОО БАРИХ ИМЭЙЛ</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <button onclick="handleOrder()" id="orderBtn" class="btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="color:var(--purple); font-family:'Orbitron'; font-size:0.9rem; margin-bottom:15px;">ТӨЛБӨР ТӨЛӨХ</h3>
            <div class="qr-grid">
                <div class="qr-item"><img src="orca-image-2014133490.jpeg.jpeg" alt="MonPay"><p style="color:#000; font-size:9px; font-weight:bold; margin-top:4px;">MONPAY</p></div>
                <div class="qr-item"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=monpay://transfer?phone=99106925689" alt="QPay"><p style="color:#000; font-size:9px; font-weight:bold; margin-top:4px;">QPAY / ШУУД</p></div>
            </div>
            <div class="bank-info">
                <p>Хаан банк: <strong>85330511</strong></p>
                <p>Хүлээн авагч: <strong>Б.ХОС-ЭРДЭНЭ</strong></p>
                <p style="color:var(--neon); font-size:0.7rem; margin-top:8px;">* ГҮЙЛГЭЭНИЙ УТГА ДЭЭР ИМЭЙЛЭЭ БИЧНЭ ҮҮ!</p>
            </div>
            <button onclick="window.location.reload()" class="btn" style="background:#111; font-size:0.7rem; margin-top:15px;">БУЦАХ</button>
        </div>
    </div>
</div>

<div class="fixed-footer">
    <p style="font-size:0.7rem; color:#ccc; margin-bottom:8px;">Асуудал гарвал холбогдоорой:</p>
    <a href="tel:89773973" class="call-btn">📞 89773973</a>
</div>

<script>
    async function handleOrder() {
        const link = document.getElementById('link').value;
        const email = document.getElementById('email').value;
        const selectedRadio = document.querySelector('input[name="smm_service"]:checked');

        if (!link || !email || !selectedRadio) { alert("Мэдээллээ бүрэн бөглөнө үү!"); return; }

        const btn = document.getElementById('orderBtn');
        btn.innerText = "УНШИЖ БАЙНА...";
        btn.disabled = true;

        const botToken = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
        const chatId = "7069407872";
        const text = `🚀 ШИНЭ ЗАХИАЛГА\n\n🔗 Линк: ${link}\n📧 Email: ${email}\n🛠 Үйлчилгээ: ${selectedRadio.getAttribute('data-name')}\n💰 Үнэ: ${selectedRadio.value}₮`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: text })
            });

            if (response.ok) {
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('paymentArea').style.display = 'block';
            } else {
                alert("Telegram алдаа! Бот руугаа ороод Start дараарай.");
                btn.innerText = "ЗАХИАЛГА ӨГӨХ";
                btn.disabled = false;
            }
        } catch (e) {
            alert("Интернэтээ шалгана уу.");
            btn.innerText = "ЗАХИАЛГА ӨГӨХ";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
