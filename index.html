<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Boost 2030 | Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Арын дэвсгэрийн эффект */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111, #000);
        }
        .orb {
            position: absolute; width: 400px; height: 400px;
            background: linear-gradient(var(--neon-blue), var(--neon-purple));
            filter: blur(150px); border-radius: 50%; opacity: 0.1;
            animation: float 20s infinite alternate;
        }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(100vw, 100vh); } }

        header {
            height: 60vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 10px; text-transform: uppercase;
        }

        /* Үйлчилгээний картууд */
        .services {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; padding: 50px 10%;
        }
        .cyber-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 30px; text-align: center; transition: 0.4s;
        }
        .cyber-card:hover { transform: translateY(-10px); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .price-tag { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--neon-blue); margin: 15px 0; }

        /* Захиалгын форм */
        .order-container { padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
        .cyber-form {
            width: 100%; max-width: 550px; background: rgba(15, 23, 42, 0.8);
            padding: 40px; border-radius: 30px; border: 1px solid #333;
        }
        input, select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444;
            padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: var(--neon-purple); }

        /* Үнийн дэлгэц */
        #priceDisplay {
            margin: 20px 0; padding: 20px; border-radius: 15px;
            background: rgba(188, 19, 254, 0.1); border: 1px solid var(--neon-purple);
            text-align: center; display: none;
        }

        /* Төлбөрийн терминал */
        #paymentTerminal {
            display: none; margin-top: 30px; padding: 30px;
            border: 2px solid var(--neon-blue); border-radius: 25px;
            background: #000; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .submit-btn {
            width: 100%; padding: 20px; background: transparent;
            border: 2px solid var(--neon-blue); color: var(--neon-blue);
            font-family: 'Orbitron'; cursor: pointer; border-radius: 12px;
            transition: 0.3s; text-transform: uppercase;
        }
        .submit-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }

        footer { text-align: center; padding: 40px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
