<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLAR CORE | №1 DIGITAL STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;600;700&display=swap');

        :root {
            --sun-gold: #ffcc00;
            --flare-orange: #ff6600;
            --void: #050000;
            --light: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--void);
            color: var(--light);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CUSTOM SOLAR CURSOR */
        #cursor {
            width: 15px; height: 15px;
            background: var(--sun-gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 30px var(--flare-orange), 0 0 60px var(--sun-gold);
            transition: transform 0.1s ease;
        }

        /* SUN BACKGROUND EFFECT */
        .sun-bg {
            position: fixed;
            top: 50%; left: 50%;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: solar-pulse 10s infinite alternate;
        }

        @keyframes solar-pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }

        /* MAIN CONTAINER */
        .solar-frame {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 204, 0, 0.1);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px);
            position: relative;
        }

        .solar-frame::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--sun-gold), transparent);
        }

        /* TEXT STYLES */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--sun-gold);
            letter-spacing: 15px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px var(--flare-orange);
        }

        .tagline {
            font-size: 11px;
            letter-spacing: 10px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* INPUT FIELDS */
        .input-box { margin-bottom: 35px; text-align: left; }
        .input-box label {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--sun-gold);
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }
        .input-box input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid #222;
            padding: 12px 0;
            color: white;
            font-size: 18px;
            transition: 0.4s;
        }
        .input-box input:focus { border-bottom-color: var(--sun-gold); outline: none; }

        /* SERVICE SELECTION */
        .services-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 40px; }
        .svc-node {
            padding: 20px;
            border: 1px solid #111;
            font-family: 'Orbitron';
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .svc-node:hover, .svc-node.active {
            border-color: var(--sun-gold);
            background: rgba(255, 204, 0, 0.05);
            color: var(--sun-gold);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }

        /* ORDER BUTTON */
        .btn-solar {
            width: 100%;
            padding: 25px;
            background: var(--sun-gold);
            color: black;
            font-family: 'Orbitron';
            font-weight: 900;
            border: none;
            letter-spacing: 8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-solar:hover {
            box-shadow: 0 0 40px var(--sun-gold);
            transform: scale(1.02);
        }

        /* CHECKOUT MODAL */
        #checkout {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--void); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .qr-frame { padding: 15px; background: white; margin-bottom: 30px; box-shadow: 0 0 50px var(--sun-gold); }
        .qr-frame img { width: 220px; display: block; }
        
        .bank-info { text-align: center; }
        .bank-info h3 { font-family: 'Orbitron'; color: var(--sun-gold); font-size: 24px; margin-bottom: 5px; }
        .bank-info p { font-size: 12px; color: #555; letter-spacing: 3px; }

        /* CONTACTS */
        .footer-links { margin-top: 40px; display: flex; justify-content: center; gap: 40px; }
        .footer-links a { color: #555; text-decoration: none; font-size: 12px; transition: 0.3s; }
        .footer-links a:hover { color: var(--sun-gold); }

    </style>
</head>
