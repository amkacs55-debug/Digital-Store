<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL STORE | PREMIUM SMM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; }
        body { background: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding-bottom: 100px; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 150px; margin-top: 30px; filter: drop-shadow(0 0 10px var(--neon)); }
        h1 { font-size: 2.5rem; letter-spacing: 2px; margin: 10px 0; color: var(--neon); }
        
        /* Inputs */
        .input-group { text-align: left; margin-top: 20px; }
        label { color: var(--neon); font-size: 14px; font-weight: bold; text-transform: uppercase; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        
        /* Service Buttons */
        .service-btn { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid #333; color: white; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .service-btn.active { border-color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .price { color: var(--neon); font-weight: bold; }

        .submit-btn { width: 100%; padding: 20px; margin-top: 20px; background: white; border: none; color: black; font-weight: bold; border-radius: 15px; cursor: pointer; text-transform: uppercase; }

        /* Fixed Bottom Buttons - ЭНД ЧИНИЙ ХҮССЭН ТОВЧНУУД */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #222; z-index: 90; }
        .nav-item { flex: 1; padding: 15px; text-align: center; text-decoration: none; color: #888; font-size: 12px; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 5px; }
        .nav-item:hover { color: var(--neon); }

        /* Checkout Layer */
        #checkout { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .qr-box { background: white; padding: 15px; border-radius: 20px; margin: 20px 0; }
        .qr-box img { width: 200px; }
    </style>
</head>
<body>

<div class="container" id="main">
    <img src="logo.jpg" class="logo">
    <h1>DIGITAL STORE</h1>
    <div class="input-group">
        <label>1. ЛИНК (LINK)</label>
        <input type="text" id="link" placeholder="Линкээ оруулна уу">
        
        <label>2. ХОЛБОГДОХ ДУГААР</label>
        <input type="number" id="phone" placeholder="Утасны дугаараа оруулна уу">

        <label>3. ҮЙЛЧИЛГЭЭ СОНГОХ</label>
        <div id="services">
            <div class="service-btn active" onclick="selectService(this, 'IG Followers', 7000)">
                <span>IG Followers (1k)</span> <span class="price">7,000₮</span>
            </div>
            <div class="service-btn" onclick="selectService(this, 'FB Page Followers', 7000)">
                <span>FB Page Followers (1k)</span> <span class="price">7,000₮</span>
            </div>
            <div class="service-btn" onclick="selectService(this, 'TikTok Like', 6000)">
                <span>TikTok Like (1k)</span> <span class="price">6,000₮</span>
            </div>
        </div>

        <button class="submit-btn" onclick="order()">ЗАХИАЛГА ӨГӨХ</button>
    </div>
</div>

<div class="bottom-nav">
    <a href="tel:85330511" class="nav-item">
        <i class="fas fa-phone"></i> CALL US
    </a>
    <a href="https://instagram.com/Arhat_0625" target="_blank" class="nav-item">
        <i class="fab fa-instagram"></i> INSTAGRAM
    </a>
</div>

<div id="checkout">
    <h2 style="color: var(--neon);">CHECKOUT</h2>
    <div class="qr-box">
        <img src="monpay_qr.jpg" alt="Monpay QR">
    </div>
    <div style="background: #111; padding: 20px; border-radius: 15px; width: 80%;">
        <p>ДАНС: <b style="color: var(--neon);">99106925689</b></p>
        <p>НЭР: <b style="color: var(--neon);">Б.ХОС-ЭРДЭНЭ</b></p>
    </div>
    <button style="margin-top:20px; background:#222; color:white; border:none; padding:10px 20px; border-radius:10px;" onclick="location.reload()">БУЦАХ</button>
</div>

<script>
    let selectedSvc = "IG Followers";
    let basePrice = 7000;

    function selectService(el, name, price) {
        document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedSvc = name;
        basePrice = price;
    }

    async function order() {
        const link = document.getElementById('link').value;
        const phone = document.getElementById('phone').value;
        if(!link || !phone) { alert("Мэдээллээ бүрэн бөглөнө үү!"); return; }

        const token = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
        const chat_id = "7069407872";
        const text = `🚀 ЗАХИАЛГА!\n\n📞 Дугаар: ${phone}\n📦 Үйлчилгээ: ${selectedSvc}\n🔗 Линк: ${link}`;

        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
        document.getElementById('main').style.display = 'none';
        document.getElementById('checkout').style.display = 'flex';
    }
</script>

</body>
</html>
