<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --monpay-red: #ff3b30;
            --qpay-blue: #00b0f0;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111, #000);
        }
        .orb {
            position: absolute; width: 400px; height: 400px;
            background: linear-gradient(var(--neon-blue), var(--neon-purple));
            filter: blur(150px); border-radius: 50%; opacity: 0.1;
            animation: float 20s infinite alternate;
        }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(100vw, 100vh); } }

        header {
            height: 35vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 8vw, 4rem);
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 5px; text-transform: uppercase;
        }

        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; padding: 20px 10%;
        }
        .cyber-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; text-align: center; transition: 0.3s;
        }
        .price-tag { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon-blue); margin: 10px 0; }

        .order-container { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .cyber-form {
            width: 100%; max-width: 550px; background: rgba(15, 23, 42, 0.9);
            padding: 30px; border-radius: 25px; border: 1px solid #333;
        }
        input, select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444;
            padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 20px; outline: none;
        }

        #priceDisplay {
            margin: 20px 0; padding: 20px; border-radius: 15px;
            background: rgba(188, 19, 254, 0.1); border: 1px solid var(--neon-purple);
            text-align: center; display: none;
        }

        #paymentTerminal {
            display: none; margin-top: 30px; padding: 30px;
            border: 2px solid var(--neon-blue); border-radius: 25px;
            background: #000; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .qr-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .qr-box { text-align: center; flex: 1; min-width: 130px; }
        .qr-img { background: white; padding: 10px; border-radius: 15px; margin-bottom: 5px; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .qr-img img { width: 100%; display: block; }

        .submit-btn {
            width: 100%; padding: 20px; background: transparent;
            border: 2px solid var(--neon-blue); color: var(--neon-blue);
            font-family: 'Orbitron'; cursor: pointer; border-radius: 12px;
            transition: 0.3s; text-transform: uppercase; font-weight: bold;
        }
        .submit-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }

        footer { text-align: center; padding: 40px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>

<div class="bg-animate"><div class="orb"></div></div>

    <p style="color: var(--neon-blue); letter-spacing: 2px;">SOCIAL MEDIA BOOSTING</p>
</header>

    <div class="cyber-card"><h3>INSTAGRAM</h3><div class="price-tag">10,000₮</div><p>1,000 Followers</p></div>
    <div class="cyber-card"><h3>TIKTOK</h3><div class="price-tag">15,000₮</div><p>1,000 Followers</p></div>

</section>

        </form>
