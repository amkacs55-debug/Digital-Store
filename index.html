<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL STORE | NEON BLUE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #ff00ff; 
            --glow: rgba(255, 0, 255, 0.5);
            --dark: #080008; 
            --card: #150015;
        }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding-bottom: 120px;
        }

        .container { width: 90%; max-width: 420px; }

        /* Header */
        .logo-section { text-align: center; margin-top: 40px; margin-bottom: 30px; }
        h1 { 
            font-size: 2.5rem; 
            color: var(--neon); 
            text-shadow: 0 0 15px var(--glow);
            letter-spacing: 3px; 
            margin: 10px 0; 
            font-weight: 900; 
            font-style: italic;
            text-transform: uppercase;
        }

        /* Inputs */
        label { color: var(--neon); font-size: 12px; font-weight: 800; display: block; margin: 25px 0 12px 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 20px; background: var(--card); border: 1px solid #330033; 
            color: white; border-radius: 18px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--glow); }

        /* Services */
        .service-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; }
        .service-item { 
            background: var(--card); border: 1px solid #220022; padding: 18px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; 
        }
        .service-item.active { border-color: var(--neon); background: rgba(255, 0, 255, 0.1); box-shadow: 0 0 10px var(--glow); }
        .service-name { font-size: 14px; font-weight: 600; }
        .service-price { color: var(--neon); font-weight: 800; }

        /* Price */
        .price-display { 
            text-align: center; margin-top: 30px; padding: 35px 20px; 
            background: var(--card); border-radius: 30px; border: 1px solid #330033;
        }
        .total-amt { font-size: 45px; font-weight: 900; text-shadow: 0 0 15px var(--glow); }
        .bonus-badge { color: #ffd700; background: rgba(255, 215, 0, 0.1); padding: 5px 15px; border-radius: 50px; font-size: 12px; }

        .btn-order { 
            width: 100%; padding: 22px; margin-top: 25px; background: var(--neon); border: none; 
            color: white; font-weight: 900; border-radius: 20px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 20px var(--glow);
        }

        /* Payment Icons */
        .pay-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .pay-icons img { height: 35px; filter: drop-shadow(0 0 5px var(--glow)); }

        /* Checkout */
        #checkout-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark); z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }
        .qr-card { background: white; padding: 15px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 0 25px var(--glow); }
        .qr-card img { width: 220px; display: block; }
        .bank-info { width: 85%; background: var(--card); padding: 20px; border-radius: 20px; border-left: 5px solid var(--neon); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 15px 0; border-top: 1px solid #222; }
        .nav-link { flex: 1; text-align: center; color: #444; text-decoration: none; font-size: 11px; }
        .nav-link.active { color: var(--neon); }
    </style>
</head>
<body>

<div class="container" id="main-form">
    <div class="logo-section">
        <h1>DIGITAL STORE</h1>
        <div style="color: #666; font-size: 11px; letter-spacing: 2px;">PREMIUM SMM SOLUTIONS</div>
    </div>

    <label><i class="fas fa-link"></i> 1. ЛИНК (LINK)</label>
    <input type="text" id="orderLink" placeholder="Профайл">

    <label><i class="fas fa-phone"></i> 2. ХОЛБОГДОХ ДУГААР</label>
    <input type="number" id="orderPhone" placeholder="Утасны дугаараа оруулна уу">

    <label><i class="fas fa-th-list"></i> 3. ҮЙЛЧИЛГЭЭ СОНГОХ</label>
    <div class="service-list">
        <div class="service-item active" onclick="selSvc(this, 'Instagram Followers', 7)">
            <span class="service-name">Instagram Followers</span><span class="service-price">1 = 7₮</span>
        </div>
        <div class="service-item" onclick="selSvc(this, 'FB Page Followers', 7)">
            <span class="service-name">FB Page Followers</span><span class="service-price">1 = 7₮</span>
        </div>
        <div class="service-item" onclick="selSvc(this, 'TikTok Likes', 6)">
            <span class="service-name">TikTok Likes</span><span class="service-price">1 = 6₮</span>
        </div>
        </div>

    <label><i class="fas fa-sort-numeric-up"></i> 4. ТОО ШИРХЭГ</label>
    <input type="number" id="orderCount" value="1000" oninput="recalc()">

    <div class="price-display">
        <div class="total-amt" id="totalVal">7,000₮</div>
        <div class="bonus-badge" id="bonusVal">🎁 +100 БОНУС (10%)</div>
    </div>

    <button class="btn-order" onclick="placeOrder()">ЗАХИАЛГА ӨГӨХ</button>
</div>

<div id="checkout-screen">
    <div class="pay-icons">
        <img src="https://qpay.mn/logo.png" alt="Qpay"> <img src="https://monpay.mn/logo.png" alt="Monpay"> </div>
    <h3 style="color: var(--neon); margin-bottom: 20px;">ТӨЛБӨР ТӨЛӨХ</h3>
    <div class="qr-card">
        <img src="monpay_qr.jpg" alt="Payment QR">
    </div>
    <div class="bank-info">
        <p style="margin: 5px 0; font-size: 13px;">MONPAY / ДАНС: <b style="color: var(--neon);">99106925689</b></p>
        <p style="margin: 5px 0; font-size: 13px;">ХҮЛЭЭН АВАГЧ: <b style="color: var(--neon);">Б.ХОС-ЭРДЭНЭ</b></p>
    </div>
    <button onclick="location.reload()" style="margin-top: 25px; background: none; border: 1px solid #444; color: #888; padding: 10px 30px; border-radius: 10px; cursor: pointer;">БУЦАХ</button>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link"><i class="fas fa-phone"></i><br>CALL US</a>
    <a href="#" class="nav-link active"><i class="fab fa-instagram"></i><br>INSTAGRAM</a>
</div>

<script>
    let pricePerUnit = 7;
    let selectedName = 'Instagram Followers';

    function selSvc(el, name, price) {
        document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        pricePerUnit = price;
        selectedName = name;
        recalc();
    }

    function recalc() {
        const count = document.getElementById('orderCount').value || 0;
        const total = count * pricePerUnit;
        const bonus = Math.floor(count * 0.1);
        document.getElementById('totalVal').innerText = total.toLocaleString() + "₮";
        document.getElementById('bonusVal').innerText = `🎁 +${bonus.toLocaleString()} БОНУС (10%)`;
    }

    async function placeOrder() {
        const link = document.getElementById('orderLink').value;
        const phone = document.getElementById('orderPhone').value;
        if(!link || !phone) { alert("Мэдээллээ бүрэн бөглөнө үү!"); return; }
        
        // Telegram notification logic can be placed here
        document.getElementById('main-form').style.display = 'none';
        document.getElementById('checkout-screen').style.display = 'flex';
    }
</script>
</body>
</html>
