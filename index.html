<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Boost | Followers Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0061ff; --secondary: #60efff; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        
        /* Hero Section */
        header { padding: 80px 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 50px 5%; }
        
        /* Service Cards */
        .card { background: #1e293b; border-radius: 20px; padding: 30px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--secondary); }
        .icon { font-size: 40px; margin-bottom: 15px; }
        .price { font-size: 2rem; font-weight: bold; color: var(--secondary); margin: 20px 0; }
        
        /* Order Form */
        .order-box { background: #1e293b; margin: 20px auto; padding: 30px; border-radius: 20px; max-width: 500px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #334155; color: white; }
        .buy-btn { background: var(--secondary); color: var(--dark); border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 95%; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <h1>DIGITAL BOOST</h1>
    <p>Сошиал хаягаа дараагийн түвшинд гарга</p>
</header>

<div class="container">
    <div class="card">
        <div class="icon">📸</div>
        <h3>Instagram Followers</h3>
        <p>1,000 Дагагч (Real Mix)</p>
        <div class="price">15,000₮</div>
        <p>⚡ Хурдан хүргэлт</p>
    </div>

    <div class="card">
        <div class="icon">🎥</div>
        <h3>TikTok Views</h3>
        <p>10,000 Үзэлт (High Quality)</p>
        <div class="price">5,000₮</div>
        <p>🔥 Трэндэд орох боломж</p>
    </div>
</div>

<div class="order-box">
    <h3>Захиалга өгөх</h3>
    <input type="text" placeholder="Сошиал линк (URL)">
    <select>
        <option>Instagram Followers - 15,000₮</option>
        <option>TikTok Views - 5,000₮</option>
    </select>
    <button class="buy-btn" onclick="orderNow()">QPay-ээр төлөх</button>
</div>

<script>
    function orderNow() {
        alert("Захиалга хүлээн авлаа! QPay код үүсгэхийн тулд админтай холбогдоно уу.");
    }
</script>

</body>
</html>
