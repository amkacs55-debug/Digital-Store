
<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Official SMM Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
            --deep-dark: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--deep-dark);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(112, 0, 255, 0.08) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            padding: 20px;
        }

        .main-wrapper {
            max-width: 480px;
            margin: 40px auto;
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Текст болон Лого хэсэг */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.8rem;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #fff 10%, var(--neon-cyan) 60%, var(--neon-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
            margin-bottom: 8px;
        }

        .sub-logo {
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 5px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Форм хэсэг */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            margin-left: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .styled-input {
            width: 100%;
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            color: #fff;
            font-size: 1rem;
            transition: var(--transition);
        }

        .styled-input:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        /* Үйлчилгээ сонгох хэсэг */
        .service-selection {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .service-item input { display: none; }

        .service-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .service-item input:checked + .service-box {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.15), transparent);
            border-color: var(--neon-cyan);
            transform: translateX(8px);
        }

        .service-name {
            font-weight: 800;
            font-size: 1.05rem;
            color: #fff;
            display: block;
            letter-spacing: 0.5px;
        }

        .service-price {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
        }

        /* Тооцоолуур */
        .calculator-zone {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 35px;
            text-align: center;
            margin-bottom: 35px;
            border: 1px solid var(--glass-border);
        }

        .total-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .bonus-tag {
            background: #fff;
            color: #000;
            padding: 6px 18px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 900;
            margin-top: 10px;
            display: inline-block;
            text-transform: uppercase;
        }

        .submit-btn {
            width: 100%;
            padding: 24px;
            border-radius: 24px;
            border: none;
            background: #fff;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.15rem;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.25);
        }

        /* Payment */
        #paymentArea { display: none; text-align: center; animation: fadeIn 1s ease; }

        .bank-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            padding: 30px;
            text-align: left;
            border: 1px solid var(--glass-border);
            margin-top: 25px;
        }

        .bank-value {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--neon-cyan);
            display: block;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Footer */
        .footer-call {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 18px;
            text-align: center;
            z-index: 100;
        }

        .call-link {
            color: var(--neon-cyan);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header-section">
        <div class="logo-text">DIGITAL STORE</div>
        <div class="sub-logo">PREMIUM SMM SOLUTIONS</div>
    </div>

    <div class="glass-panel">
        <div id="formSection">
            <div class="input-group">
                <span class="form-label">1. Линк (Link)</span>
                <input type="url" id="userLink" class="styled-input" placeholder="https://...">
            </div>

            <span class="form-label">2. Үйлчилгээ сонгох</span>
            <div class="service-selection">
                <label class="service-item">
                    <input type="radio" name="service" value="fb_group" checked onclick="calculatePrice()">
                    <div class="service-box">
                        <div class="info">
                            <span class="service-name">Facebook Group Members</span>
                            <span class="service-price">1к = 6,000₮</span>
                        </div>
                    </div>
                </label>

                <label class="service-item">
                    <input type="radio" name="service" value="ig_like" onclick="calculatePrice()">
                    <div class="service-box">
                        <div class="info">
                            <span class="service-name">Instagram Reel/Post Like</span>
                            <span class="service-price">1к = 6,000₮</span>
                        </div>
                    </div>
                </label>

                <label class="service-item">
                    <input type="radio" name="service" value="tk_like" onclick="calculatePrice()">
                    <div class="service-box">
                        <div class="info">
                            <span class="service-name">TikTok Like</span>
                            <span class="service-price">1ш = 7₮</span>
                        </div>
                    </div>
                </label>

                <label class="service-item">
                    <input type="radio" name="service" value="tk_view" onclick="calculatePrice()">
                    <div class="service-box">
                        <div class="info">
                            <span class="service-name">TikTok Views</span>
                            <span class="service-price">1к = 500₮</span>
                        </div>
                    </div>
                </label>
            </div>

            <div class="input-group">
                <span class="form-label">3. Тоо ширхэг</span>
                <input type="number" id="orderQty" class="styled-input" value="1000" min="100" oninput="calculatePrice()">
            </div>

            <div class="calculator-zone">
                <div id="finalPrice" class="total-amount">6,000₮</div>
                <div id="bonusLabel" class="bonus-tag">🎁 +100 БОНУС (10%)</div>
            </div>

            <div class="input-group">
                <span class="form-label">4. Имэйл хаяг</span>
                <input type="email" id="userEmail" class="styled-input" placeholder="example@mail.com">
            </div>

            <button onclick="processOrder()" id="mainSubmit" class="submit-btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="font-family:'Orbitron'; color:#fff; margin-bottom:25px; letter-spacing:3px;">CHECKOUT</h3>
            <div class="qr-wrapper">
                <img src="orca-image-2014133490.jpeg.jpeg" alt="Payment QR" class="qr-image">
                <p style="color:#000; font-weight:900; margin-top:10px; font-size:0.8rem;">SCAN TO PAY</p>
            </div>
            <div class="bank-details">
                <div style="margin-bottom:15px;">
                    <span style="font-size:0.7rem; color:#666; text-transform:uppercase;">Monpay Данс</span>
                    <span class="bank-value">85330511</span>
                </div>
                <div>
                    <span style="font-size:0.7rem; color:#666; text-transform:uppercase;">Хүлээн авагч</span>
                    <span class="bank-value">Б.ХОС-ЭРДЭНЭ</span>
                </div>
            </div>
            <button onclick="window.location.reload()" class="submit-btn" style="background:none; border:1px solid #333; color:#555; margin-top:30px; font-size:0.8rem;">БУЦАХ</button>
        </div>
    </div>
</div>

<div class="footer-call">
    <a href="tel:89773973" class="call-link">📞 CONTACT: 89773973</a>
</div>

<script>
    const serviceRates = { fb_group: 6, ig_like: 6, tk_like: 7, tk_view: 0.5 };
    const TELEGRAM_TOKEN = '8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ';
    const CHAT_ID = '7069407872';

    function calculatePrice() {
        const platform = document.querySelector('input[name="service"]:checked').value;
        const qty = parseInt(document.getElementById('orderQty').value) || 0;
        const priceDisplay = document.getElementById('finalPrice');
        const bonusDisplay = document.getElementById('bonusLabel');

        if(qty < 100) {
            priceDisplay.innerText = "MIN 100";
            bonusDisplay.style.visibility = "hidden";
            return { total: 0, bonus: 0 };
        }

        bonusDisplay.style.visibility = "visible";
        const unitPrice = serviceRates[platform];
        const totalPrice = Math.round(qty * unitPrice);
        
        let bonusPercent = qty >= 10000 ? 0.12 : (qty >= 1000 ? 0.10 : 0.05);
        const bonusQty = Math.floor(qty * bonusPercent);
        
        priceDisplay.innerText = totalPrice.toLocaleString() + "₮";
        bonusDisplay.innerText = `🎁 +${bonusQty.toLocaleString()} БОНУС (${bonusPercent * 100}%)`;
        
        return { total: totalPrice, bonus: bonusQty };
    }

    async function processOrder() {
        const link = document.getElementById('userLink').value;
        const email = document.getElementById('userEmail').value;
        const qty = document.getElementById('orderQty').value;
        const service = document.querySelector('input[name="service"]:checked');
        const serviceName = service.closest('.service-item').querySelector('.service-name').innerText;
        const calcData = calculatePrice();

        if(!link || !email || qty < 100) { alert("⚠️ Мэдээллээ бүрэн бөглөнө үү!"); return; }

        const btn = document.getElementById('mainSubmit');
        btn.innerText = "УНШИЖ БАЙНА...";
        btn.disabled = true;

        const message = `🔥 NEW ORDER! 🔥\n\n👤 Хэрэглэгч: Б.ХОС-ЭРДЭНЭ\n🔗 Link: ${link}\n🛠 Үйлчилгээ: ${serviceName}\n🔢 Тоо: ${qty} (+${calcData.bonus})\n💰 Нийт: ${calcData.total}₮\n📧 Email: ${email}`;

        try {
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            });
        } catch(e) {}

        setTimeout(() => {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('paymentArea').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 800);
    }
    calculatePrice();
</script>
</body>
</html>
