<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium Boost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --bg: #050505;
            --card-active: rgba(0, 242, 255, 0.08);
            --card-border-active: rgba(0, 242, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-family: 'Orbitron';
            text-align: center;
            font-size: 2.2rem;
            background: linear-gradient(to right, var(--neon), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .sub-title {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.5;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 7px; color: var(--neon); font-weight: bold; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #222;
            background: rgba(0,0,0,0.6);
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* --- Шинэ Захиалгын Картны Хэсэг --- */
        
        .service-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* Платформын гарчиг (Facebook, Instagram гэх мэт) */
        .platform-header {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin: 15px 0 8px 5px;
            display: flex;
            align-items: center;
            grid-column: 1 / -1;
        }
        .platform-header::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--purple);
            border-radius: 50%;
            margin-right: 10px;
            filter: drop-shadow(0 0 5px var(--purple));
        }

        /* Жинхэнэ radio input-ыг нуух */
        .service-option input[type="radio"] {
            display: none;
        }

        /* Картны үндсэн загвар */
        .service-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Карт дээр дарахад */
        .service-option input[type="radio"]:checked + .service-card {
            background: var(--card-active);
            border-color: var(--card-border-active);
            transform: scale(1.01);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.1);
        }

        /* Карт дээр хулгана очиход */
        .service-card:hover {
            border-color: rgba(0, 242, 255, 0.3);
        }

        /* Карт доторх текст */
        .service-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .service-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f0f0f0;
            display: flex;
            align-items: center;
        }
        /* Тоог илүү тодруулах */
        .service-title span {
            font-family: 'Orbitron';
            margin-right: 5px;
            font-size: 0.85rem;
            color: white;
        }
        .service-price {
            font-family: 'Orbitron';
            font-size: 1rem;
            color: var(--neon);
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        /* Сүүлийн үеийн урамшуулал */
        .hot-tag {
            font-family: 'Orbitron';
            font-size: 0.5rem;
            color: white;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            text-transform: uppercase;
        }

        /* Checkmark дүрс */
        .check-icon {
            opacity: 0;
            width: 18px; height: 18px;
            transition: 0.3s ease;
        }
        .service-option input[type="radio"]:checked + .service-card .check-icon {
            opacity: 1;
        }

        /* -- Үндсэн товчлуур -- */
        .btn {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(45deg, var(--neon), var(--purple));
            color: white;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(188, 19, 254, 0.4);
        }

        /* Төлбөрийн хэсэг */
        #paymentArea { display: none; margin-top: 20px; animation: fadeIn 0.6s ease; }
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .qr-item { background: white; padding: 10px; border-radius: 15px; text-align: center; }
        .qr-item img { width: 100%; border-radius: 10px; display: block; }
        .qr-label { font-size: 0.65rem; font-weight: 800; margin-top: 10px; color: #333; }
        .bank-info { background: rgba(255, 255, 255, 0.05); padding: 18px; border-radius: 20px; text-align: center; font-size: 0.85rem; line-height: 1.6; border: 1px solid rgba(0, 242, 255, 0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>DIGITAL STORE</h1>
    <p class="sub-title">PREMIUM BOOST SERVICE</p>
    <div class="glass-card">
        <div id="formSection">
            
            <div class="input-group">
                <label>ХОЛБООС (LINK / URL)</label>
                <input type="url" id="link" placeholder="https://..." required>
            </div>

            <div class="input-group">
                <label>ҮЙЛЧИЛГЭЭ СОНГОХ</label>
                
                <div class="service-grid">
                    
                    <div class="platform-header">Facebook</div>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="10000" data-name="FB 1k Followers">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Followers</div>
                            </div>
                            <div class="service-price">10,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="9000" data-name="FB 1k Reactions">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Reactions</div>
                            </div>
                            <div class="service-price">9,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="32000" data-name="FB 1k Shares">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Shares</div>
                            </div>
                            <div class="service-price">32,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>

                    <div class="platform-header">Instagram</div>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="10000" data-name="IG 1k Followers">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Followers <span class="hot-tag">HOT</span></div>
                            </div>
                            <div class="service-price">10,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="6000" data-name="IG 1k Like">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Like</div>
                            </div>
                            <div class="service-price">6,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>

                    <div class="platform-header">TikTok</div>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="15000" data-name="TikTok 1k Followers">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Followers</div>
                            </div>
                            <div class="service-price">15,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="5000" data-name="TikTok 1k Like">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>1k</span> Like</div>
                            </div>
                            <div class="service-price">5,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>
                    <label class="service-option">
                        <input type="radio" name="smm_service" value="2000" data-name="TikTok 5k Views">
                        <div class="service-card">
                            <div class="service-info">
                                <div class="service-title"><span>5k</span> Views</div>
                            </div>
                            <div class="service-price">2,000₮ <img class="check-icon" src="https://img.icons8.com/fluency/48/checked--v1.png" alt="checked"/></div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label>ХОЛБОО БАРИХ ИМЭЙЛ</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            
            <button onclick="handleOrder()" id="orderBtn" class="btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="text-align: center; font-size: 0.9rem; color: var(--purple); font-family: 'Orbitron'; margin-bottom: 20px;">ТӨЛБӨР ТӨЛӨХ</h3>
            <div class="qr-grid">
                <div class="qr-item">
                    <img src="orca-image-2014133490.jpeg.jpeg" alt="MonPay QR">
                    <div class="qr-label" style="color: #ff3b30;">MONPAY QR</div>
                </div>
                <div class="qr-item">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=monpay://transfer?phone=99106925689" alt="QPay QR">
                    <div class="qr-label" style="color: #00b0f0;">QPAY / ШУУД</div>
                </div>
            </div>
            <div class="bank-info">
                <p>MonPay дугаар: <strong style="color: var(--neon);">99106925689</strong></p>
                <p>Хүлээн авагч: <strong>Б.ХОС-ЭРДЭНЭ</strong></p>
                <p style="color: #ff4d4d; font-size: 0.7rem; margin-top: 10px;">* ГҮЙЛГЭЭНИЙ УТГА ДЭЭР ИМЭЙЛЭЭ БИЧНЭ ҮҮ!</p>
            </div>
            <button onclick="window.location.reload()" class="btn" style="background: #111; font-size: 0.75rem; margin-top: 20px;">БУЦАХ</button>
        </div>
    </div>
</div>

<script>
    function handleOrder() {
        // Утгуудыг авах
        const link = document.getElementById('link').value;
        const email = document.getElementById('email').value;
        const selectedRadio = document.querySelector('input[name="smm_service"]:checked');

        // Бөглөсөн эсэхийг шалгах
        if (!link || !email || !selectedRadio) {
            alert("Мэдээллээ бүрэн бөглөнө үү!");
            return;
        }

        const serviceName = selectedRadio.getAttribute('data-name');
        const price = selectedRadio.value;

        // Товчлуурыг идэвхгүй болгох
        const btn = document.getElementById('orderBtn');
        btn.innerText = "УНШИЖ БАЙНА...";
        btn.disabled = true;

        const botToken = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
        const chatId = "7069407872";
        const text = `🚀 ШИНЭ ЗАХИАЛГА\n\n🔗 Линк: ${link}\n🛠 Үйлчилгээ: ${serviceName}\n📧 Email: ${email}\n💰 Үнэ: ${price}₮`;

        // Telegram илгээх
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`)
        .then(() => {
            console.log("Telegram очлоо");
        })
        .catch(err => console.error("Telegram алдаа:", err));

        // Formspree илгээх
        fetch("https://formspree.io/f/xojkzpdb", {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ link, email, service: serviceName, price: price + "₮" })
        })
        .then(() => {
            console.log("Formspree очлоо");
        });

        // 1.5 секундын дараа төлбөрийг харуулах
        setTimeout(() => {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('paymentArea').style.display = 'block';
        }, 1500);
    }
</script>

</body>
</html>
