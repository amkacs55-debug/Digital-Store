<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL STORE | PREMIUM SMM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding-bottom: 120px; }
        .container { width: 90%; max-width: 400px; }
        
        .logo-section { text-align: center; margin-top: 30px; }
        .logo { width: 150px; filter: drop-shadow(0 0 10px var(--neon)); }
        h1 { font-size: 2.2rem; color: var(--neon); letter-spacing: 2px; margin-bottom: 5px; }
        
        /* Form Styling */
        label { color: var(--neon); font-size: 13px; font-weight: bold; display: block; margin: 20px 0 8px; text-transform: uppercase; }
        input { width: 100%; padding: 16px; background: #111; border: 1px solid #222; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        /* Service List */
        .service-list { display: flex; flex-direction: column; gap: 8px; }
        .service-item { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .service-item.active { border-color: var(--neon); background: rgba(0, 242, 255, 0.05); }
        .service-name { font-weight: 500; font-size: 14px; }
        .service-price { color: var(--neon); font-weight: bold; font-size: 14px; }

        /* Price Section */
        .price-display { text-align: center; margin-top: 30px; padding: 30px; background: #111; border-radius: 20px; }
        .total-amt { font-size: 40px; font-weight: 900; margin-bottom: 5px; }
        .bonus-tag { color: #fbd38d; background: rgba(251, 211, 141, 0.1); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }

        .btn-order { width: 100%; padding: 20px; margin-top: 25px; background: white; border: none; color: black; font-weight: bold; border-radius: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #222; display: flex; z-index: 90; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #666; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--neon); }

        /* Checkout Screen */
        #checkout { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .qr-card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .qr-card img { width: 220px; }
        .acc-info { width: 85%; background: #111; padding: 20px; border-radius: 15px; border-left: 4px solid var(--neon); }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div class="logo-section">
        <img src="logo.jpg" class="logo">
        <h1>DIGITAL STORE</h1>
        <p style="color: #555; font-size: 11px;">PREMIUM SMM SOLUTIONS</p>
    </div>

    <label>1. ЛИНК (LINK)</label>
    <input type="text" id="uLink" placeholder="Линкээ оруулна уу">

    <label>2. ХОЛБОГДОХ ДУГААРАА ОРУУЛНА УУ</label>
    <input type="number" id="uPhone" placeholder="85330511">

    <label>3. ҮЙЛЧИЛГЭЭ СОНГОХ</label>
    <div class="service-list">
        <div class="service-item active" onclick="setService(this, 'IG Followers', 7000)">
            <span class="service-name">IG Followers</span><span class="service-price">1к = 7,000₮</span>
        </div>
        <div class="service-item" onclick="setService(this, 'FB Page Followers', 7000)">
            <span class="service-name">FB Page Followers</span><span class="service-price">1к = 7,000₮</span>
        </div>
        <div class="service-item" onclick="setService(this, 'FB Group Members', 4000)">
            <span class="service-name">FB Group Members</span><span class="service-price">1к = 4,000₮</span>
        </div>
    </div>

    <label>4. ТОО ШИРХЭГ</label>
    <input type="number" id="uCount" value="1000" oninput="updatePrice()">

    <div class="price-display">
        <div class="total-amt" id="displayTotal">7,000₮</div>
        <div class="bonus-tag">🎁 +100 БОНУС (10%)</div>
    </div>

    <button class="btn-order" onclick="submitOrder()">ЗАХИАЛГА ӨГӨХ</button>
</div>

<div class="bottom-nav">
    <a href="tel:85330511" class="nav-item"><i class="fas fa-phone"></i> CALL US</a>
    <a href="https://instagram.com/Arhat_0625" class="nav-item active"><i class="fab fa-instagram"></i> INSTAGRAM</a>
</div>

<div id="checkout">
    <h2 style="color: var(--neon); letter-spacing: 2px;">CHECKOUT</h2>
    <div class="qr-card">
        <img src="monpay_qr.jpg" alt="QR Pay">
    </div>
    <div class="acc-info">
        <p style="margin: 5px 0; font-size: 13px; color: #888;">ДАНСНЫ МЭДЭЭЛЭЛ:</p>
        <p style="margin: 5px 0;">MONPAY / ДАНС: <b style="color: var(--neon);">99106925689</b></p>
        <p style="margin: 5px 0;">ХҮЛЭЭН АВАГЧ: <b style="color: var(--neon);">Б.ХОС-ЭРДЭНЭ</b></p>
    </div>
    <button onclick="location.reload()" style="margin-top: 30px; background: #222; color: white; border: none; padding: 12px 35px; border-radius: 12px; cursor: pointer;">БУЦАХ</button>
</div>

<script>
    let currentSvcPrice = 7000;
    let currentSvcName = 'IG Followers';

    function setService(el, name, price) {
        document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        currentSvcPrice = price;
        currentSvcName = name;
        updatePrice();
    }

    function updatePrice() {
        const count = document.getElementById('uCount').value || 0;
        const total = (count / 1000) * currentSvcPrice;
        document.getElementById('displayTotal').innerText = total.toLocaleString() + "₮";
    }

    async function submitOrder() {
        const link = document.getElementById('uLink').value;
        const phone = document.getElementById('uPhone').value;
        const count = document.getElementById('uCount').value;
        const total = document.getElementById('displayTotal').innerText;

        if(!link || !phone) { alert("Мэдээллээ бүрэн бөглөнө үү!"); return; }

        const token = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
        const chat_id = "7069407872";
        const msg = `🚀 ШИНЭ ЗАХИАЛГА!\n\n📞 Дугаар: ${phone}\n📦 Үйлчилгээ: ${currentSvcName}\n🔢 Тоо: ${count}\n💰 Нийт: ${total}\n🔗 Линк: ${link}`;

        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
        
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('checkout').style.display = 'flex';
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
