<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium Social Boost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 450px; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: var(--neon-blue); font-weight: bold; }

        input, select {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
            color: white; outline: none; transition: 0.3s;
        }

        .btn {
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }

        /* Төлбөрийн хэсэг */
        #paymentArea { display: none; margin-top: 20px; animation: fadeIn 0.8s ease; }
        .qr-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .qr-box { background: white; padding: 10px; border-radius: 15px; text-align: center; }
        .qr-box img { width: 100%; border-radius: 8px; display: block; }
        .qr-label { font-size: 0.65rem; font-weight: 800; margin-top: 8px; color: #333; }

        .bank-info {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px;
            text-align: center; font-size: 0.85rem; line-height: 1.6;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>DIGITAL STORE</h1>
    <p style="text-align:center; font-size:0.7rem; opacity:0.5; margin-bottom:20px;">PREMIUM SOCIAL SERVICES</p>

    <div class="glass-card">
        <div id="formSection">
            <div class="input-group">
                <label>ХОЛБООС (LINK)</label>
                <input type="url" id="link" placeholder="https://instagram.com/user..." required>
            </div>
            <div class="input-group">
                <label>ҮЙЛЧИЛГЭЭ СОНГОХ</label>
                <select id="service">
                    <option value="" disabled selected>Сонгоно уу...</option>
                    <option value="10000">Instagram 1k Followers - 10,000₮</option>
                    <option value="15000">TikTok 1k Followers - 15,000₮</option>
                    <option value="10000">Facebook 1k Followers - 10,000₮</option>
                </select>
            </div>
            <div class="input-group">
                <label>ИМЭЙЛ ХАЯГ</label>
                <input type="email" id="email" placeholder="amka@gmail.com" required>
            </div>
            <button onclick="handleOrder()" id="orderBtn" class="btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="text-align: center; font-size: 0.8rem; color: var(--neon-purple); font-family: 'Orbitron';">ТӨЛБӨР ТӨЛӨХ</h3>
            <div class="qr-container">
                <div class="qr-box">
                    <img src="orca-image-2014133490.jpeg.jpeg" alt="MonPay QR">
                    <div class="qr-label" style="color: #ff3b30;">MONPAY</div>
                </div>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=99106925689" alt="QPay QR">
                    <div class="qr-label" style="color: #00b0f0;">QPAY / БАНК</div>
                </div>
            </div>
            <div class="bank-info">
                <p>Данс: <strong style="color: var(--neon-blue);">99106925689</strong></p>
                <p>ХААН БАНК | Х.ХОСБАЯР</p>
                <p style="color: #ff4d4d; font-size: 0.7rem; margin-top: 5px;">* ГҮЙЛГЭЭНИЙ УТГА ДЭЭР ИМЭЙЛЭЭ БИЧНЭ ҮҮ!</p>
            </div>
            <button onclick="window.location.reload()" class="btn" style="background: #222; font-size: 0.7rem;">БУЦАХ</button>
        </div>
    </div>
</div>
