<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; }
        h1 { font-family: 'Orbitron'; text-align: center; font-size: 1.8rem; background: linear-gradient(to right, var(--neon), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin-bottom: 5px; }
        .sub-title { text-align: center; font-size: 0.7rem; opacity: 0.5; margin-bottom: 25px; letter-spacing: 1px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: var(--neon); font-weight: bold; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; outline: none; font-size: 0.9rem; }
        .btn { width: 100%; padding: 16px; margin-top: 10px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(188, 19, 254, 0.4); }
        
        #paymentArea { display: none; margin-top: 20px; animation: fadeIn 0.6s ease; }
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .qr-item { background: white; padding: 8px; border-radius: 12px; text-align: center; }
        .qr-item img { width: 100%; border-radius: 6px; display: block; }
        .qr-label { font-size: 0.6rem; font-weight: 800; margin-top: 6px; color: #333; }
        .bank-info { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; text-align: center; font-size: 0.8rem; border: 1px solid rgba(0, 242, 255, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>DIGITAL STORE</h1>
    <p class="sub-title">PREMIUM SOCIAL BOOST SERVICE</p>
    <div class="glass-card">
        <div id="formSection">
            <div class="input-group">
                <label>ХОЛБООС (URL / LINK)</label>
                <input type="url" id="link" placeholder="https://instagram.com/p/..." required>
            </div>
            <div class="input-group">
                <label>ҮЙЛЧИЛГЭЭ СОНГОХ</label>
                <select id="service" onchange="updatePrice()">
                    <option value="" disabled selected>Сонгоно уу...</option>
                    <optgroup label="Facebook">
                        <option value="10000">FB 1,000 Followers - 10,000₮</option>
                        <option value="9000">FB 1,000 Reactions - 9,000₮</option>
                        <option value="32000">FB 1,000 Shares - 32,000₮</option>
                    </optgroup>
                    <optgroup label="Instagram">
                        <option value="10000">IG 1,000 Followers - 10,000₮</option>
                        <option value="6000">IG 1,000 Like - 6,000₮</option>
                    </optgroup>
                    <optgroup label="TikTok">
                        <option value="15000">TikTok 1,000 Followers - 15,000₮</option>
                        <option value="5000">TikTok 1,000 Like - 5,000₮</option>
                        <option value="2000">TikTok 5,000 Views - 2,000₮</option>
                    </optgroup>
                </select>
            </div>
            <div class="input-group">
                <label>ХОЛБОО БАРИХ ИМЭЙЛ</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div id="totalPrice" style="text-align:center; color:var(--neon); font-family:'Orbitron'; margin-bottom:10px; display:none;"></div>
            <button onclick="handleOrder()" id="orderBtn" class="btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="text-align: center; font-size: 0.8rem; color: var(--purple); font-family: 'Orbitron'; margin-bottom: 15px;">ТӨЛБӨР ТӨЛӨХ</h3>
            <div class="qr-grid">
                <div class="qr-item">
                    <img src="orca-image-2014133490.jpeg.jpeg" alt="MonPay QR">
                    <div class="qr-label" style="color: #ff3b30;">MONPAY QR</div>
                </div>
                <div class="qr-item">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=monpay://transfer?phone=99106925689" alt="QPay QR">
                    <div class="qr-label" style="color: #00b0f0;">QPAY / ШУУД</div>
                </div>
            </div>
            <div class="bank-info">
                <p>MonPay дугаар: <strong style="color: var(--neon);">99106925689</strong></p>
                <p>Хүлээн авагч: <strong>Б.ХОС-ЭРДЭНЭ</strong></p>
                <p style="color: #ff4d4d; font-size: 0.65rem; margin-top: 8px;">* ГҮЙЛГЭЭНИЙ УТГА ДЭЭР ИМЭЙЛЭЭ БИЧНЭ ҮҮ!</p>
            </div>
            <button onclick="window.location.reload()" class="btn" style="background: #222; font-size: 0.7rem; margin-top: 15px;">БУЦАХ</button>
        </div>
    </div>
</div>

<script>
    function updatePrice() {
        const select = document.getElementById('service');
        const priceDiv = document.getElementById('totalPrice');
        if(select.value) {
            priceDiv.style.display = 'block';
            priceDiv.innerText = "Нийт: " + Number(select.value).toLocaleString() + "₮";
        }
    }

    function handleOrder() {
        const link = document.getElementById('link').value;
        const email = document.getElementById('email').value;
        const service = document.getElementById('service').options[document.getElementById('service').selectedIndex]?.text;

        if(!link || !email || !document.getElementById('service').value) {
            alert("Мэдээллээ бүрэн бөглөнө үү!");
            return;
        }

        const btn = document.getElementById('orderBtn');
        btn.innerText = "БОЛОВСРУУЛЖ БАЙНА...";
        btn.disabled = true;

        const botToken = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
        const chatId = "7069407872";
        const text = `🚀 ШИНЭ ЗАХИАЛГА\n\n🔗 Линк: ${link}\n🛠 Үйлчилгээ: ${service}\n📧 Email: ${email}`;

        // Telegram илгээх
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);

        // Formspree илгээх
        fetch("https://formspree.io/f/xojkzpdb", {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ link, email, service })
        });

        // 1.2 секундын дараа төлбөр рүү шилжих
        setTimeout(() => {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('paymentArea').style.display = 'block';
        }, 1200);
    }
</script>

</body>
</html>
