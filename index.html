<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; }
        h1 { font-family: 'Orbitron'; text-align: center; font-size: 2rem; background: linear-gradient(to right, var(--neon), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin-bottom: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.4); color: white; outline: none; }
        .btn { width: 100%; padding: 18px; margin-top: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(188, 19, 254, 0.4); }
        
        #paymentArea { display: none; margin-top: 20px; animation: fadeIn 0.6s ease; }
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .qr-item { background: white; padding: 10px; border-radius: 15px; text-align: center; }
        .qr-item img { width: 100%; border-radius: 8px; display: block; }
        .qr-label { font-size: 0.6rem; font-weight: 800; margin-top: 8px; color: #333; }
        .bank-info { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; text-align: center; font-size: 0.85rem; line-height: 1.6; border: 1px solid rgba(0, 242, 255, 0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>DIGITAL STORE</h1>
    <div class="glass-card">
        <div id="formSection">
            <div class="input-group">
                <label>Линк (URL)</label>
                <input type="url" id="link" placeholder="https://..." required>
            </div>
            <div class="input-group">
                <label>Үйлчилгээ</label>
                <select id="service">
                    <option value="" disabled selected>Сонгоно уу...</option>
                    <option value="10000">Instagram 1k Followers - 10,000₮</option>
                    <option value="15000">TikTok 1k Followers - 15,000₮</option>
                    <option value="10000">Facebook 1k Followers - 10,000₮</option>
                </select>
            </div>
            <div class="input-group">
                <label>Имэйл</label>
                <input type="email" id="email" placeholder="и-мэйл хаяг" required>
            </div>
            <button onclick="handleOrder()" id="orderBtn" class="btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="text-align: center; font-size: 0.8rem; color: var(--purple); font-family: 'Orbitron'; margin-bottom: 10px;">ТӨЛБӨР ТӨЛӨХ</h3>
            <div class="qr-grid">
                <div class="qr-item">
                    <img src="orca-image-2014133490.jpeg.jpeg" alt="MonPay QR">
                    <div class="qr-label" style="color: #ff3b30;">MONPAY QR</div>
                </div>
                <div class="qr-item">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=monpay://transfer?phone=99106925689" alt="QPay QR">
                    <div class="qr-label" style="color: #00b0f0;">ШУУД УНШУУЛАХ</div>
                </div>
            </div>
            <div class="bank-info">
                <p>MonPay дугаар: <strong style="color: var(--neon);">99106925689</strong></p>
                <p>Хүлээн авагч: <strong>Б.ХОС-ЭРДЭНЭ</strong></p>
                <p style="color: #ff4d4d; font-size: 0.65rem; margin-top: 8px;">* ГҮЙЛГЭЭНИЙ УТГА ДЭЭР ИМЭЙЛЭЭ БИЧНЭ ҮҮ!</p>
            </div>
            <button onclick="window.location.reload()" class="btn" style="background: #222; font-size: 0.7rem; margin-top: 15px;">БУЦАХ</button>
        </div>
    </div>
</div>

<script>
    function handleOrder() {
        const link = document.getElementById('link').value;
        const email = document.getElementById('email').value;
        const service = document.getElementById('service').options[document.getElementById('service').selectedIndex]?.text;

        if(!link || !email || !document.getElementById('service').value) {
            alert("Мэдээллээ бүрэн бөглөнө үү!");
            return;
        }

        document.getElementById('orderBtn').innerText = "УНШИЖ БАЙНА...";
        document.getElementById('orderBtn').disabled = true;

        const botToken = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
        const chatId = "7069407872";
        const text = `🚀 ШИНЭ ЗАХИАЛГА\n\n🔗 Линк: ${link}\n🛠 Үйлчилгээ: ${service}\n📧 Email: ${email}`;

        // Telegram илгээх
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);

        // Formspree илгээх
        fetch("https://formspree.io/f/xojkzpdb", {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ link, email, service })
        });

        // Төлбөр харуулах
        setTimeout(() => {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('paymentArea').style.display = 'block';
        }, 1000);
    }
</script>

</body>
</html>
