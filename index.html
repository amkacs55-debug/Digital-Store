<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | 24/7 Boost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --bg: #050505; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        .container { padding: 40px 20px; max-width: 600px; margin: auto; }
        h1 { font-family: 'Orbitron'; color: var(--neon); letter-spacing: 3px; font-size: 2.5rem; }
        .form-box { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .price-box { margin: 20px 0; padding: 15px; border: 1px dashed var(--purple); border-radius: 10px; display: none; }
        .btn { width: 100%; padding: 18px; background: none; border: 2px solid var(--neon); color: var(--neon); font-family: 'Orbitron'; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        
        /* Төлбөрийн хэсэг */
        #paymentTerminal { display: none; margin-top: 30px; padding: 25px; border-radius: 20px; background: #000; border: 2px solid var(--purple); animation: fadeIn 0.5s; }
        .qr-wrap { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .qr-card { text-align: center; width: 140px; }
        .qr-card img { width: 100%; background: white; padding: 10px; border-radius: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 40px;">
        <h1>DIGITAL STORE</h1>
        <p style="opacity: 0.6;">Нийгмийн сүлжээний цогц үйлчилгээ</p>
    </header>

    <div class="form-box">
        <form id="orderForm" action="https://formspree.io/f/xojkzpdb" method="POST">
            <input type="url" name="link" id="userLink" placeholder="Сошиал линк (URL)" required>
            
            <select name="service" id="serviceSelect" onchange="updatePrice()" required>
                <option value="" disabled selected>Үйлчилгээ сонгох</option>
                <optgroup label="Instagram">
                    <option value="10000">Instagram 1,000 Followers - 10,000₮</option>
                    <option value="5000">Instagram 500 Followers - 5,000₮</option>
                </optgroup>
                <optgroup label="TikTok">
                    <option value="15000">TikTok 1,000 Followers - 15,000₮</option>
                    <option value="7500">TikTok 500 Followers - 7,500₮</option>
                </optgroup>
                <optgroup label="Facebook">
                    <option value="10000">Facebook 1,000 Followers - 10,000₮</option>
                    <option value="5000">Facebook 500 Followers - 5,000₮</option>
                </optgroup>
            </select>

            <input type="email" name="email" id="userEmail" placeholder="Холбоо барих имэйл" required>

            <div id="priceBox" class="price-box">
                <span style="font-size: 0.8rem; opacity: 0.6;">ТӨЛӨХ ДҮН:</span>
                <div id="totalAmount" style="font-size: 2rem; color: var(--neon); font-family: 'Orbitron';">0₮</div>
            </div>

            <button type="submit" id="submitBtn" class="btn">ЗАХИАЛГА ӨГӨХ</button>
        </form>

        <div id="paymentTerminal">
            <h3 style="font-family: 'Orbitron'; font-size: 1rem; color: var(--neon);">PAYMENT GATEWAY</h3>
            <div class="qr-wrap">
                <div class="qr-card">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=monpay://transfer?phone=99106925689">
                    <p style="color: #ff3b30; font-size: 0.7rem; font-weight: bold; margin-top: 5px;">MONPAY</p>
                </div>
                <div class="qr-card">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=99106925689">
                    <p style="color: #00b0f0; font-size: 0.7rem; font-weight: bold; margin-top: 5px;">QPAY / BANK</p>
                </div>
            </div>
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <p style="font-size: 1rem; font-weight: bold;">Данс: 99106925689</p>
                <p style="font-size: 0.7rem; color: #ff4d4d; margin-top: 10px;">* Гүйлгээний утга дээр ИМЭЙЛ-ээ бичнэ үү!</p>
            </div>
            <button onclick="window.location.reload()" class="btn" style="border-color: var(--purple); color: var(--purple);">ТӨЛӨЛТ ХИЙСЭН</button>
        </div>
    </div>
</div>

<script>
    function updatePrice() {
        const val = document.getElementById('serviceSelect').value;
        document.getElementById('priceBox').style.display = 'block';
        document.getElementById('totalAmount').innerText = Number(val).toLocaleString() + '₮';
    }

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "ИЛГЭЭЖ БАЙНА...";
        btn.disabled = true;

        const link = document.getElementById('userLink').value;
        const service = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;
        const email = document.getElementById('userEmail').value;

        // Telegram Notification
        const token = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ"; 
        const chatId = "7069407872"; 
        const text = `🚀 ШИНЭ ЗАХИАЛГА!\n\n🔗 Холбоос: ${link}\n🛠 Үйлчилгээ: ${service}\n📧 Имэйл: ${email}\n💰 Төлөв: Төлбөр хүлээгдэж буй`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`)
        .then(() => {
            this.submit(); // Formspree илгээх
        })
        .catch(() => {
            this.submit();
        });

        document.getElementById('paymentTerminal').style.display = 'block';
        document.getElementById('paymentTerminal').scrollIntoView({ behavior: 'smooth' });
    };
</script>

</body>
</html>
<style>
    /* Неон гэрэлтэй карт */
    .cyber-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }

    .cyber-card:hover {
        transform: translateY(-10px);
        border-color: var(--neon-blue);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
    }

    /* Арын дэвсгэр хөдөлгөөнтэй неон дугуйнууд */
    .blob {
        position: absolute;
        width: 300px;
        height: 300px;
        background: var(--neon-purple);
        filter: blur(80px);
        border-radius: 50%;
        z-index: -1;
        opacity: 0.2;
        animation: move 10s infinite alternate;
    }

    @keyframes move {
        from { transform: translate(-10%, -10%); }
        to { transform: translate(100%, 50%); }
    }

    /* Гоё товчлуур */
    .submit-btn {
        background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
        color: white;
        border: none;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
</style>
