<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0b0f11; --card: #11181b; --accent: #00e5ff; --ok: #2ecc71; --in: #1a2428; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .step { display: none; max-width: 450px; margin: 0 auto; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 10px var(--accent); margin: 0; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 11px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; background: var(--in); border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-next { background: var(--accent); color: #000; }
        .btn-pay { background: var(--ok); color: white; }
        .btn-back { background: transparent; color: #666; border: 1px solid #333; margin-top: 10px; }
        
        .pay-box { background: var(--card); padding: 15px; border-radius: 18px; border: 1px solid #222; margin-bottom: 15px; text-align: center; }
        .info-row { background: var(--in); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #222; }
        .qr-img { width: 180px; border: 5px solid white; border-radius: 12px; margin: 10px auto 20px; display: block; }
        
        .contact-us { margin-top: 30px; display: flex; justify-content: center; gap: 10px; border-top: 1px solid #222; padding-top: 20px; }
        .contact-us a { color: var(--accent); text-decoration: none; font-size: 11px; font-weight: bold; padding: 8px 12px; border: 1px solid #222; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>DIGITAL STORE</h1></header>

    <div id="step1" class="step active">
        <div class="input-group">
            <label>Хүлээн авах линк (URL)</label>
            <input type="text" id="url" placeholder="https://instagram.com/...">
        </div>
        <div class="input-group">
            <label>Холбогдох утас</label>
            <input type="number" id="phone" placeholder="88******">
        </div>
        <div class="input-group">
            <label>Үйлчилгээ сонгох</label>
            <select id="service" onchange="updateTotal()">
                <optgroup label="Instagram">
                    <option value="IG Followers" data-price="7">Instagram Followers (1ш = 7₮)</option>
                    <option value="IG Reel Like" data-price="5">Instagram Reel Like (1ш = 5₮)</option>
                    <option value="IG Views" data-price="1">Instagram Views (1ш = 1₮)</option>
                </optgroup>
                <optgroup label="Facebook">
                    <option value="FB Page Followers" data-price="7.5">FB Page Followers (1ш = 7.5₮)</option>
                    <option value="FB Group Members" data-price="4">FB Group Members (1ш = 4₮)</option>
                    <option value="FB Post Like" data-price="3">FB Post Like (1ш = 3₮)</option>
                </optgroup>
                <optgroup label="TikTok">
                    <option value="TikTok Followers" data-price="8.5">TikTok Followers (1ш = 8.5₮)</option>
                    <option value="TikTok Like" data-price="4">TikTok Like (1ш = 4₮)</option>
                    <option value="TikTok View" data-price="0.5">TikTok View (1ш = 0.5₮)</option>
                </optgroup>
                <optgroup label="Telegram">
                    <option value="TG Members" data-price="5.5">Telegram Members (1ш = 5.5₮)</option>
                </optgroup>
            </select>
        </div>
        <div class="input-group">
            <label>Тоо хэмжээ</label>
            <select id="amount" onchange="updateTotal()">
                <option value="100">100 ширхэг</option>
                <option value="500">500 ширхэг</option>
                <option value="1000" selected>1,000 ширхэг</option>
                <option value="2000">2,000 ширхэг</option>
                <option value="5000">5,000 ширхэг</option>
            </select>
        </div>
        <div style="text-align:center; color:var(--accent); font-weight:bold; margin-bottom:15px;">НИЙТ: <span id="total_val">7,000</span>₮</div>
        <button class="btn btn-next" onclick="goStep(2)">ЗАХИАЛГА ӨГӨХ</button>
    </div>

    <div id="step2" class="step">
        <div class="pay-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=99106925689" class="qr-img">
            <div class="info-row" onclick="copy('99106925689', 'Данс амжилттай хуулагдлаа')">
                <span>ХААН: <b>99106925689</b></span> <span>📋</span>
            </div>
            <div class="info-row" onclick="copy(document.getElementById('phone').value, 'Утга амжилттай хуулагдлаа')">
                <span>УТГА: <b id="copy_phone">...</b></span> <span>📋</span>
            </div>
            <div class="info-row" style="color:var(--ok); border-color:var(--ok);">
                <span>ДҮН: <b id="copy_total">0</b>₮</span>
            </div>
            <button class="btn" style="background:#1c3d33; color:white;" onclick="window.location.href='khanbank://'">🏦 KHAN BANK РУУ ҮСРЭХ</button>
            
            <input type="file" id="file" accept="image/*" style="display:none" onchange="document.getElementById('file_lbl').innerText='БАРИМТ ХАВСАРГАЛАА ✅'">
            <button class="btn" style="background:#222; border:1px dashed #444; margin-top:10px;" onclick="document.getElementById('file').click()" id="file_lbl">📷 БАРИМТ ХАВСАРГАХ</button>
        </div>
        <button class="btn btn-pay" onclick="submitOrder()">ТӨЛБӨР ИЛГЭЭХ</button>
        <button class="btn btn-back" onclick="goStep(1)">⬅️ БУЦАХ</button>
    </div>

    <div id="step3" class="step">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--ok);">АМЖИЛТТАЙ! ✅</h2>
            <p style="font-size:12px; color:#888;">Баримт илгээгдлээ. Сэтгэгдлээ үлдээгээрэй.</p>
        </div>
        <textarea id="comment" placeholder="Манай үйлчилгээ танд таалагдсан уу?"></textarea>
        <button class="btn btn-next" onclick="sendComment()">СЭТГЭГДЭЛ ИЛГЭЭХ</button>
        <p style="text-align:center; margin-top:25px; color:var(--accent); font-weight:bold;">Манайхаар үйлчлүүлсэнд баярлалаа хөөрхөнөө ✨</p>
    </div>

    <div class="contact-us">
        <a href="tel:89773973">📞 ЗАЛГАХ</a>
        <a href="https://t.me/digital_fanshop">✈️ TELEGRAM</a>
        <a href="https://instagram.com/digital_fanshop">📸 INSTAGRAM</a>
    </div>
</div>

<script>
    const token = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
    const chat_id = "7069407872";

    function updateTotal() {
        const s = document.getElementById('service');
        const price = s.options[s.selectedIndex].getAttribute('data-price');
        const amount = document.getElementById('amount').value;
        const total = (price * amount).toLocaleString();
        document.getElementById('total_val').innerText = total;
        document.getElementById('copy_total').innerText = total;
    }

    function goStep(n) {
        if(n === 2 && (!document.getElementById('url').value || !document.getElementById('phone').value)) {
            return Swal.fire({ icon: 'error', title: 'Мэдээлэл дутуу!', background: '#11181b', color: '#fff' });
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        if(n === 2) {
            document.getElementById('copy_phone').innerText = document.getElementById('phone').value;
            updateTotal();
        }
        window.scrollTo(0,0);
    }

    function copy(t, m) {
        navigator.clipboard.writeText(t);
        Swal.fire({ title: m, timer: 1200, showConfirmButton: false, background: '#11181b', color: '#fff' });
    }

    async function submitOrder() {
        const file = document.getElementById('file').files[0];
        if(!file) return Swal.fire({ icon: 'warning', title: 'Баримтаа хавсаргана уу!', background: '#11181b', color: '#fff' });
        
        Swal.fire({ title: 'Илгээж байна...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const cap = `🚀 *ШИНЭ ЗАХИАЛГА*\n\n🔗 *Линк:* ${document.getElementById('url').value}\n📞 *Утас:* ${document.getElementById('phone').value}\n🛠 *Үйлчилгээ:* ${document.getElementById('service').value}\n🔢 *Тоо:* ${document.getElementById('amount').value}ш\n💰 *Дүн:* ${document.getElementById('copy_total').innerText}₮\n🎁 *Бонус:* +10%\n✅ *Төлөв:* Баримт ирсэн`;

        const fd = new FormData();
        fd.append('chat_id', chat_id); fd.append('photo', file); fd.append('caption', cap); fd.append('parse_mode', 'Markdown');

        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
            if(res.ok) { Swal.close(); goStep(3); }
        } catch (e) { Swal.fire('Алдаа гарлаа!'); }
    }

    async function sendComment() {
        const msg = `💬 *СЭТГЭГДЭЛ:* ${document.getElementById('comment').value || "Байхгүй"}\n📞 *Утас:* ${document.getElementById('phone').value}`;
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        Swal.fire({ icon: 'success', title: 'Баярлалаа!', text: 'Манайхаар үйлчлүүлсэнд баярлалаа хөөрхөнөө ✨', background: '#11181b', color: '#fff' }).then(() => location.reload());
    }
    
    updateTotal();
</script>
</body>
</html>
