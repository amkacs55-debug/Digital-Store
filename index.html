<!DOCTYPE html>
<html lang="mn">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store | Premium SMM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
            --deep-dark: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--deep-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 20px;
        }

        .main-wrapper { max-width: 480px; margin: 40px auto; animation: fadeIn 1s ease; }

        .header-section { text-align: center; margin-bottom: 40px; }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            border-radius: 35px;
            padding: 30px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group { margin-bottom: 25px; }
        .styled-input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
        }

        .service-selection { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 25px; }
        .service-item input { display: none; }
        .service-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .service-item input:checked + .service-box {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.1);
            transform: translateX(5px);
        }

        .service-name { font-weight: 800; font-size: 0.9rem; }
        .service-price { font-size: 0.8rem; color: var(--neon-cyan); font-family: 'JetBrains Mono'; }

        .calculator-zone {
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        .total-amount { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; }
        .bonus-tag { background: #fff; color: #000; padding: 4px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 900; margin-top: 5px; display: inline-block; }

        .submit-btn {
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            border: none;
            background: #fff;
            color: #000;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #paymentArea { display: none; text-align: center; }
        .qr-wrapper { background: #fff; padding: 15px; border-radius: 20px; margin: 20px auto; width: fit-content; max-width: 250px; }
        .qr-image { width: 100%; max-width: 210px; border-radius: 10px; }

        .bank-details { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; text-align: left; margin-top: 15px; }
        .bank-value { color: var(--neon-cyan); font-weight: 800; font-family: 'JetBrains Mono'; }

        .footer-call { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }
        .call-link { color: var(--neon-cyan); text-decoration: none; font-family: 'Orbitron'; font-weight: 800; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header-section">
        <div class="logo-text">DIGITAL STORE</div>
    </div>

    <div class="glass-panel">
        <div id="formSection">
            <div class="input-group">
                <span class="form-label">1. Линк (Link)</span>
                <input type="url" id="userLink" class="styled-input" placeholder="🔗 Линкээ оруулна уу">
            </div>

            <span class="form-label">2. Үйлчилгээ сонгох</span>
            <div class="service-selection">
                <label class="service-item">
                    <input type="radio" name="service" value="ig_follow" checked onclick="calculatePrice()">
                    <div class="service-box">
                        <span class="service-name">IG Followers</span>
                        <span class="service-price">1к = 10,000₮</span>
                    </div>
                </label>
                <label class="service-item">
                    <input type="radio" name="service" value="fb_share" onclick="calculatePrice()">
                    <div class="service-box">
                        <span class="service-name">FB Post Share</span>
                        <span class="service-price">1к = 15,000₮</span>
                    </div>
                </label>
                <label class="service-item">
                    <input type="radio" name="service" value="fb_group" onclick="calculatePrice()">
                    <div class="service-box">
                        <span class="service-name">FB Group Members</span>
                        <span class="service-price">1к = 6,000₮</span>
                    </div>
                </label>
                <label class="service-item">
                    <input type="radio" name="service" value="ig_like" onclick="calculatePrice()">
                    <div class="service-box">
                        <span class="service-name">IG Reel/Post Like</span>
                        <span class="service-price">1к = 6,000₮</span>
                    </div>
                </label>
                <label class="service-item">
                    <input type="radio" name="service" value="tk_like" onclick="calculatePrice()">
                    <div class="service-box">
                        <span class="service-name">TikTok Like</span>
                        <span class="service-price">1ш = 7₮</span>
                    </div>
                </label>
                <label class="service-item">
                    <input type="radio" name="service" value="tk_view" onclick="calculatePrice()">
                    <div class="service-box">
                        <span class="service-name">TikTok Views</span>
                        <span class="service-price">1к = 500₮</span>
                    </div>
                </label>
            </div>

            <div class="input-group">
                <span class="form-label">3. Тоо ширхэг</span>
                <input type="number" id="orderQty" class="styled-input" value="1000" min="100" oninput="calculatePrice()">
            </div>

            <div class="calculator-zone">
                <div id="finalPrice" class="total-amount">10,000₮</div>
                <div id="bonusLabel" class="bonus-tag">🎁 +100 БОНУС (10%)</div>
            </div>

            <button onclick="processOrder()" id="mainSubmit" class="submit-btn">ЗАХИАЛГА ӨГӨХ</button>
        </div>

        <div id="paymentArea">
            <h3 style="color:#fff; margin-bottom:15px; font-family:'Orbitron';">CHECKOUT</h3>
            <div class="qr-wrapper">
                <img src="orca-image-2014133490.jpeg.jpeg" alt="QR" class="qr-image">
            </div>
            <div class="bank-details">
                <p style="font-size:0.7rem; color:#666;">MONPAY ДАНС</p>
                <p class="bank-value">85330511</p>
                <p style="font-size:0.7rem; color:#666; margin-top:10px;">ХҮЛЭЭН АВАГЧ</p>
                <p class="bank-value">Б.ХОС-ЭРДЭНЭ</p>
            </div>
            <button onclick="window.location.reload()" class="submit-btn" style="background:none; border:1px solid #333; color:#555; margin-top:20px; font-size:0.8rem;">БУЦАХ</button>
        </div>
    </div>
</div>

<div class="footer-call">
    <a href="tel:89773973" class="call-link">📞 CONTACT: 89773973</a>
</div>

<script>
    const serviceRates = { 
        ig_follow: 10,
        fb_share: 15, 
        fb_group: 6, 
        ig_like: 6, 
        tk_like: 7, 
        tk_view: 0.5 
    };

    const TELEGRAM_TOKEN = '8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ';
    const CHAT_ID = '7069407872';

    function calculatePrice() {
        const platform = document.querySelector('input[name="service"]:checked').value;
        const qty = parseInt(document.getElementById('orderQty').value) || 0;
        const priceDisplay = document.getElementById('finalPrice');
        const bonusDisplay = document.getElementById('bonusLabel');

        if(qty < 100) { priceDisplay.innerText = "MIN 100"; bonusDisplay.style.visibility = "hidden"; return; }

        bonusDisplay.style.visibility = "visible";
        const unitPrice = serviceRates[platform];
        const totalPrice = Math.round(qty * unitPrice);
        
        let bonusPercent = qty >= 1000 ? 0.10 : 0.05;
        const bonusQty = Math.floor(qty * bonusPercent);
        
        priceDisplay.innerText = totalPrice.toLocaleString() + "₮";
        bonusDisplay.innerText = `🎁 +${bonusQty.toLocaleString()} БОНУС (${bonusPercent * 100}%)`;
        
        return { total: totalPrice, bonus: bonusQty };
    }

    async function processOrder() {
        const link = document.getElementById('userLink').value;
        const qty = document.getElementById('orderQty').value;
        const service = document.querySelector('input[name="service"]:checked');
        const serviceName = service.closest('.service-item').querySelector('.service-name').innerText;
        const calcData = calculatePrice();

        if(!link || qty < 100) { alert("⚠️ Линк болон тоогоо оруулна уу!"); return; }

        document.getElementById('mainSubmit').innerText = "УНШИЖ БАЙНА...";
        const message = `🔥 ШИНЭ ЗАХИАЛГА! 🔥\n\n🔗 Линк: ${link}\n🛠 Үйлчилгээ: ${serviceName}\n🔢 Тоо: ${qty} (+${calcData.bonus})\n💰 Үнэ: ${calcData.total}₮`;

        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            });
        } catch(e) {}

        document.getElementById('formSection').style.display = 'none';
        document.getElementById('paymentArea').style.display = 'block';
    }
    calculatePrice();
</script>
</body>
</html>
