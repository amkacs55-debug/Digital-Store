<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store - Premium SMM</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e11; --card: #15191e; --accent: #00f2ff; --ok: #00d26a; --monpay: #ed1c24; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; }
        .app { max-width: 420px; margin: 0 auto; }
        
        /* Header */
        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        header h1 { font-weight: 800; font-size: 28px; color: var(--accent); letter-spacing: -0.5px; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); margin: 0; }
        header p { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }

        /* Card & Animation */
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 25px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputs */
        label { display: block; font-size: 10px; font-weight: 700; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; padding-left: 5px; }
        input, select, textarea { 
            width: 100%; padding: 16px; background: #0b0e11; border: 1px solid #2d333b; border-radius: 18px; 
            color: white; font-size: 14px; margin-bottom: 20px; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        /* Buttons */
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; font-size: 15px; transition: 0.3s; margin-top: 5px; }
        .btn-main { background: var(--accent); color: #000; box-shadow: 0 8px 20px rgba(0, 242, 255, 0.2); }
        .btn-pay { background: #23282e; color: white; border: 1px dashed #444; }
        .btn-success { background: var(--ok); color: white; }

        /* Payment UI */
        .qr-wrap { background: white; padding: 15px; border-radius: 24px; display: inline-block; margin: 15px 0; }
        .qr-wrap img { width: 190px; height: 190px; border-radius: 10px; display: block; }
        
        .copy-box { background: #0b0e11; padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; border: 1px solid #1c2128; }
        .copy-box span { font-size: 12px; color: #8b949e; }
        .copy-box b { color: var(--accent); font-size: 14px; }

        /* Contact Modern Icons */
        .footer-socials { display: flex; justify-content: center; gap: 25px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #1c2128; }
        .footer-socials a { color: #8b949e; font-size: 20px; transition: 0.3s; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .footer-socials a span { font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .footer-socials a:hover { color: var(--accent); transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1>DIGITAL STORE</h1>
        <p>Premium SMM Solutions</p>
    </header>

    <div id="step1" class="step active">
        <div class="card">
            <label>Хүлээх авах линк (URL)</label>
            <input type="text" id="url" placeholder="https://instagram.com/user...">
            
            <label>Холбогдох утас</label>
            <input type="number" id="phone" placeholder="88******">
            
            <label>Үйлчилгээ сонгох</label>
            <select id="service" onchange="calc()">
                <optgroup label="Instagram">
                    <option value="7">Instagram Followers (1ш = 7₮)</option>
                    <option value="5">Instagram Reel Like (1ш = 5₮)</option>
                    <option value="1">Instagram Views (1ш = 1₮)</option>
                </optgroup>
                <optgroup label="Facebook">
                    <option value="7.5">FB Page Followers (1ш = 7.5₮)</option>
                    <option value="4">FB Group Members (1ш = 4₮)</option>
                    <option value="3">FB Post Like (1ш = 3₮)</option>
                </optgroup>
                <optgroup label="TikTok">
                    <option value="8.5">TikTok Followers (1ш = 8.5₮)</option>
                    <option value="4">TikTok Like (1ш = 4₮)</option>
                    <option value="0.5">TikTok View (1ш = 0.5₮)</option>
                </optgroup>
            </select>

            <label>Тоо ширхэг (Минимум 100)</label>
            <input type="number" id="count" value="1000" min="100" oninput="calc()">

            <div style="text-align: center; margin-bottom: 25px;">
                <div style="font-size: 11px; color: #8b949e; margin-bottom: 5px;">НИЙТ ТӨЛБӨР</div>
                <div id="total_display" style="font-size: 32px; font-weight: 800; color: var(--accent);">7,000₮</div>
                <div id="bonus_display" style="font-size: 11px; color: var(--ok); margin-top: 5px; font-weight: 600;">+0 бонус</div>
            </div>

            <button class="btn btn-main" onclick="go(2)">ЗАХИАЛГА ӨГӨХ</button>
        </div>
    </div>

    <div id="step2" class="step">
        <div class="card">
            <div style="text-align: center;">
                <span style="font-size: 10px; font-weight: 800; color: var(--monpay);">MONPAY / QPAY УНШУУЛАХ</span><br>
                <div class="qr-wrap">
                    <img src="https://github.com/amkacs55-debug/Digital-Store/blob/main/orca-image-653564277.jpeg.jpeg?raw=true" alt="QR">
                </div>
            </div>

            <div class="copy-box" onclick="copy('99106925689', 'Данс хуулагдлаа')">
                <div><span>ХААН | Б. ХОС-ЭРДЭНЭ</span><br><b>99106925689</b></div>
                <i class="fa-regular fa-copy" style="color: var(--accent);"></i>
            </div>
            
            <div class="copy-box" onclick="copy(document.getElementById('phone').value, 'Утга хуулагдлаа')">
                <div><span>ГҮЙЛГЭЭНИЙ УТГА</span><br><b id="copy-phone">...</b></div>
                <i class="fa-regular fa-copy" style="color: var(--accent);"></i>
            </div>

            <button class="btn" style="background:#1c2128; color:white; border:1px solid #333;" onclick="window.location.href='khanbank://'">🏦 KHAN BANK НЭЭХ</button>
            
            <input type="file" id="file-in" style="display:none" onchange="fileSelected()">
            <button class="btn btn-pay" id="file-btn" onclick="document.getElementById('file-in').click()">📷 БАРИМТ ХАВСАРГАХ</button>
            
            <button class="btn btn-success" style="margin-top: 15px;" onclick="submitOrder()">ТӨЛБӨР ИЛГЭЭХ</button>
            <p style="text-align:center; font-size:12px; color:#555; margin-top:15px; cursor:pointer;" onclick="go(1)">← Буцах</p>
        </div>
    </div>

    <div id="step3" class="step">
        <div class="card" style="text-align: center;">
            <div style="font-size: 50px; margin-bottom: 15px;">✅</div>
            <h2 style="margin: 0; color: var(--ok);">АМЖИЛТТАЙ!</h2>
            <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Баримт илгээгдлээ. Сэтгэгдлээ үлдээгээрэй.</p>
            
            <textarea id="comment" placeholder="Манай үйлчилгээ танд таалагдсан уу?" style="height: 100px; margin-top: 15px;"></textarea>
            <button class="btn btn-main" onclick="sendComment()">СЭТГЭГДЭЛ ИЛГЭЭХ</button>
            
            <p style="margin-top: 25px; color: var(--accent); font-weight: 800; font-size: 13px;">Манайхаар үйлчлүүлсэнд баярлалаа хөөрхөнөө ✨</p>
        </div>
    </div>

    <div class="footer-socials">
        <a href="tel:89773973"><i class="fa-solid fa-phone"></i><span>Залгах</span></a>
        <a href="https://t.me/digital_fanshop"><i class="fa-brands fa-telegram"></i><span>Telegram</span></a>
        <a href="https://instagram.com/digital_fanshop"><i class="fa-brands fa-instagram"></i><span>Instagram</span></a>
        <a href="https://wa.me/97689773973"><i class="fa-solid fa-headset"></i><span>Support</span></a>
    </div>
</div>

<script>
    const token = "8686350962:AAE-qTC97YHESmKDHxxq3Zx7pCGgnNxhUVQ";
    const chat_id = "7069407872";

    function calc() {
        let count = parseInt(document.getElementById('count').value) || 0;
        const price = parseFloat(document.getElementById('service').value);
        let bonus = count >= 8000 ? 3000 : (count >= 6000 ? 2000 : (count >= 3000 ? 1000 : 0));
        document.getElementById('total_display').innerText = (count * price).toLocaleString() + "₮";
        document.getElementById('bonus_display').innerText = `+${bonus.toLocaleString()} урамшуулал бонус`;
        return { total: (count * price).toLocaleString(), bonus, count };
    }

    function go(n) {
        if(n === 2 && (!document.getElementById('url').value || !document.getElementById('phone').value)) {
            return Swal.fire({ icon: 'warning', title: 'Мэдээлэл дутуу!', background: '#15191e', color: '#fff' });
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        if(n === 2) document.getElementById('copy-phone').innerText = document.getElementById('phone').value;
    }

    function copy(t, m) {
        navigator.clipboard.writeText(t);
        Swal.fire({ title: m, timer: 1000, showConfirmButton: false, background: '#15191e', color: '#fff' });
    }

    function fileSelected() {
        document.getElementById('file-btn').innerText = "✅ БАРИМТ СОНГОЛОО";
        document.getElementById('file-btn').style.background = "rgba(0, 210, 106, 0.1)";
        document.getElementById('file-btn').style.color = "var(--ok)";
    }

    async function submitOrder() {
        const file = document.getElementById('file-in').files[0];
        if(!file) return Swal.fire('Баримтаа хавсаргана уу!');
        
        Swal.fire({ title: 'Илгээж байна...', didOpen: () => Swal.showLoading(), background: '#15191e', color: '#fff' });
        
        const info = calc();
        const msg = `🚀 *ШИНЭ ЗАХИАЛГА*\n\n🔗 *URL:* ${document.getElementById('url').value}\n📞 *Утас:* ${document.getElementById('phone').value}\n🛠 *Үйлчилгээ:* ${document.getElementById('service').selectedOptions[0].text}\n🔢 *Тоо:* ${info.count}ш\n🎁 *Бонус:* +${info.bonus}ш\n💰 *Дүн:* ${info.total}₮`;

        const fd = new FormData();
        fd.append('chat_id', chat_id); fd.append('photo', file); fd.append('caption', msg); fd.append('parse_mode', 'Markdown');

        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
            if(res.ok) go(3);
        } catch (e) { Swal.fire('Алдаа гарлаа!'); }
        Swal.close();
    }

    async function sendComment() {
        const msg = `💬 *СЭТГЭГДЭЛ:* ${document.getElementById('comment').value || "Байхгүй"}\n📞 *Утас:* ${document.getElementById('phone').value}`;
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        Swal.fire('Баярлалаа! ✨', '', 'success').then(() => location.reload());
    }

    calc();
</script>
</body>
</html>
