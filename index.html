<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store - Захиалга Өгөх</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #00f2ff; width: 320px; text-align: center; }
        h2 { color: #00f2ff; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #00f2ff, #7000ff); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>DIGITAL STORE</h2>
    <input type="text" id="custName" placeholder="Таны нэр (FB нэр)">
    
    <select id="servType">
        <option value="FB Page Follower 1k">FB Page Follower (1k) - 7,000₮</option>
        <option value="IG Follower 1k">IG Follower (1k) - 7,000₮</option>
        <option value="TikTok Like 1k">TikTok Like (1k) - 6,000₮</option>
        <option value="FB Group 1k">FB Group (1k) - 4,000₮</option>
    </select>
    
    <input type="text" id="socLink" placeholder="Хөгжүүлэх хаягны линк">
    
    <button onclick="sendOrder()">ЗАХИАЛАХ</button>
</div>

<script>
    // Чиний Supabase мэдээллүүд
    const supabaseUrl = 'https://mzkgdsvywetyyyx.supabase.co';
    const supabaseKey = 'sb_publishable_KdoyZuTLEbOCq1S2PfgG2A_FRe59mLp';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function sendOrder() {
        const name = document.getElementById('custName').value;
        const service = document.getElementById('servType').value;
        const link = document.getElementById('socLink').value;

        if (!name || !link) {
            alert('Мэдээллээ бүрэн бөглөнө үү!');
            return;
        }

        // 'orders' хүснэгт рүү мэдээлэл нэмэх
        const { data, error } = await _supabase
            .from('orders')
            .insert([{ name: name, service: service, link: link }]);

        if (error) {
            alert('Алдаа: ' + error.message);
        } else {
            alert('Захиалга амжилттай хадгалагдлаа! Одоо 85330511 (Б.Хос-Эрдэнэ) дугаарт төлбөрөө Monpay-ээр шилжүүлнэ үү.');
            document.getElementById('custName').value = '';
            document.getElementById('socLink').value = '';
        }
    }
</script>

</body>
</html>
